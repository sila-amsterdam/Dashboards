<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Chat Widget Dashboard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sidebar:#0f172a;--sidebar-hover:rgba(255,255,255,.07);--sidebar-active:rgba(255,255,255,.11);
  --text-side:#94a3b8;--text-side-on:#f1f5f9;
  --bg:#f1f5f9;--surface:#fff;--border:#e2e8f0;
  --text:#0f172a;--muted:#64748b;--subtle:#94a3b8;
  --r:14px;--rs:9px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
  --primary:#6366f1;--primary-d:#4f46e5;--primary-l:rgba(99,102,241,.1);
  --danger:#ef4444;--danger-l:rgba(239,68,68,.1);
  --success:#22c55e;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

/* Layout */
.layout{display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:230px;background:var(--sidebar);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px;padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.06)}
.logo-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#6366f1,#4f46e5);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-name{font-size:13.5px;font-weight:600;color:var(--text-side-on)}
.logo-sub{font-size:10px;color:var(--text-side);margin-top:1px}
.nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px}
.nav-section{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(148,163,184,.45);padding:10px 8px 4px}
.nav-btn{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;color:var(--text-side);text-decoration:none;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;transition:background .12s,color .12s}
.nav-btn svg{width:15px;height:15px;flex-shrink:0;opacity:.65}
.nav-btn:hover{background:var(--sidebar-hover);color:var(--text-side-on)}
.nav-btn:hover svg,.nav-btn.active svg{opacity:1}
.nav-btn.active{background:var(--sidebar-active);color:var(--text-side-on)}
.nav-count{margin-left:auto;background:rgba(99,102,241,.22);color:#a5b4fc;font-size:10px;font-weight:600;padding:1px 6px;border-radius:99px;min-width:18px;text-align:center}
.sidebar-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.05);font-size:11px;color:rgba(148,163,184,.35)}

/* Main */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.topbar-title{font-size:15px;font-weight:600}
.content{padding:24px;flex:1}
.hidden{display:none!important}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;padding:0 15px;height:34px;border-radius:var(--rs);border:none;font-size:13px;font-weight:500;font-family:var(--font);cursor:pointer;transition:opacity .15s,transform .1s;text-decoration:none;white-space:nowrap}
.btn svg{width:14px;height:14px;flex-shrink:0}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff;box-shadow:0 2px 8px rgba(99,102,241,.28)}
.btn-primary:hover{opacity:.9}
.btn-secondary{background:var(--surface);color:var(--text);border:1.5px solid var(--border)}
.btn-secondary:hover{background:var(--bg);border-color:#cbd5e1}
.btn-danger{background:var(--danger-l);color:var(--danger);border:1.5px solid rgba(239,68,68,.2)}
.btn-danger:hover{background:rgba(239,68,68,.16)}
.btn-ghost{background:transparent;color:var(--muted);padding:0 10px}
.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-icon{width:34px;padding:0;justify-content:center}

/* Widget cards */
.cards-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.cards-header h2{font-size:17px;font-weight:600;letter-spacing:-.02em}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}

.card{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .2s,transform .2s}
.card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.card-stripe{height:5px}
.card-body{padding:16px 18px 14px;flex:1;display:flex;flex-direction:column;gap:10px}
.card-top{display:flex;align-items:flex-start;gap:12px}
.card-avatar{width:40px;height:40px;border-radius:10px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--bg);border:1px solid var(--border)}
.card-avatar img{width:100%;height:100%;object-fit:contain}
.card-name{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-brand{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-url{font-size:11px;color:var(--subtle);background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-family:'SF Mono',Consolas,monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:11px;color:var(--subtle);display:flex;align-items:center;gap:4px}
.card-meta svg{width:11px;height:11px;opacity:.5}
.card-actions{display:flex;gap:6px;padding:10px 18px;border-top:1px solid var(--border);background:var(--bg)}
.card-actions .btn:not(.btn-icon){flex:1;justify-content:center}
.card-actions .btn-icon{flex-shrink:0}

/* Leeg */
.empty{grid-column:1/-1;text-align:center;padding:56px 20px;display:flex;flex-direction:column;align-items:center;gap:10px}
.empty-icon{width:52px;height:52px;border-radius:14px;background:var(--primary-l);display:flex;align-items:center;justify-content:center;color:var(--primary)}
.empty h3{font-size:15px;font-weight:600}
.empty p{font-size:13px;color:var(--muted);max-width:260px}

/* Skeleton */
.skel{background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:5px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Form layout */
.form-grid{display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start}
.form-col{display:flex;flex-direction:column;gap:16px}

/* Sections */
.section{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden}
.section-head{padding:13px 18px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px}
.section-head h3{font-size:12.5px;font-weight:600;letter-spacing:-.01em}
.section-head svg{width:14px;height:14px;color:var(--muted)}
.section-body{padding:18px;display:flex;flex-direction:column;gap:14px}

/* Fields */
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11.5px;font-weight:500;color:var(--muted)}
.field small{font-size:11px;color:var(--subtle);margin-top:-2px}
.input,.textarea{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:13px;font-family:var(--font);color:var(--text);background:var(--surface);outline:none;transition:border-color .15s,box-shadow .15s}
.input:focus,.textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-l)}
.input::placeholder,.textarea::placeholder{color:var(--subtle)}
.textarea{resize:vertical;min-height:70px;line-height:1.55}
.input-mono{font-family:'SF Mono',Consolas,monospace;font-size:12px}

/* Kleurpicker */
.color-row{display:flex;gap:7px;align-items:center}
.color-input{width:38px;height:34px;border-radius:7px;border:1.5px solid var(--border);padding:2px;cursor:pointer;background:none;flex-shrink:0}
.color-input::-webkit-color-swatch-wrapper{padding:0}
.color-input::-webkit-color-swatch{border-radius:4px;border:none}
.color-hex{flex:1;font-family:'SF Mono',Consolas,monospace;font-size:12px}

/* Presets */
.presets{display:flex;gap:5px;flex-wrap:wrap;margin-top:2px}
.preset{width:22px;height:22px;border-radius:6px;border:2.5px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s;flex-shrink:0}
.preset:hover{transform:scale(1.18)}
.preset.on{border-color:var(--text)}

/* Embed */
.embed-wrap{position:relative}
.embed-code{background:#0f172a;color:#e2e8f0;border-radius:var(--rs);padding:14px 16px;font-family:'SF Mono',Consolas,monospace;font-size:11.5px;line-height:1.75;overflow-x:auto;white-space:pre;border:1px solid rgba(255,255,255,.07)}
.embed-copy{position:absolute;top:9px;right:9px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.11);color:#94a3b8;border-radius:6px;padding:3px 9px;font-size:11px;cursor:pointer;font-family:var(--font);transition:background .15s,color .15s}
.embed-copy:hover{background:rgba(255,255,255,.17);color:#e2e8f0}
.embed-copy.ok{color:#86efac}

/* Preview */
.preview-wrap{position:relative;height:340px;background:#e2e8f0;border-radius:var(--rs);overflow:hidden;border:1px solid var(--border)}
.preview-label{position:absolute;top:9px;left:9px;font-size:9.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--subtle);background:rgba(255,255,255,.88);padding:3px 8px;border-radius:99px;border:1px solid var(--border)}
.pw{position:absolute;bottom:58px;right:12px;width:220px;height:250px;background:#fff;border-radius:11px;box-shadow:0 6px 24px rgba(15,23,42,.22);overflow:hidden;display:flex;flex-direction:column;border:1px solid rgba(0,0,0,.08)}
.ph{padding:9px 11px;display:flex;align-items:center;gap:7px;color:#fff;flex-shrink:0}
.ph-logo{width:20px;height:20px;border-radius:5px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.ph-logo img{width:100%;height:100%;object-fit:contain}
.ph-name{font-size:11.5px;font-weight:600}
.pm{flex:1;padding:8px;display:flex;flex-direction:column;gap:4px;background:#f3f4f6;overflow:hidden}
.pm-msg{padding:6px 8px;border-radius:8px;font-size:10.5px;max-width:88%;line-height:1.4}
.pm-bot{align-self:flex-start;background:#fff;border:1px solid rgba(0,0,0,.07)}
.pm-user{align-self:flex-end;color:#fff}
.pi{padding:6px 8px;border-top:1px solid rgba(0,0,0,.06);display:flex;gap:4px;background:#fff;flex-shrink:0}
.pi-field{flex:1;height:24px;border-radius:6px;border:1.5px solid #e2e8f0;background:#f9fafb}
.pi-send{width:24px;height:24px;border-radius:6px;border:none}
.pt{position:absolute;bottom:12px;right:12px;height:38px;border-radius:999px;border:none;color:#fff;display:flex;align-items:center;gap:7px;padding:0 14px;font-size:12px;font-weight:500;font-family:var(--font);box-shadow:0 5px 18px rgba(15,23,42,.2);cursor:default}
.pt svg{width:15px;height:15px;fill:currentColor;flex-shrink:0}

/* Settings modal */
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.modal{background:var(--surface);border-radius:var(--r);box-shadow:0 20px 60px rgba(0,0,0,.25);width:100%;max-width:460px;overflow:hidden}
.modal-head{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:15px;font-weight:600}
.modal-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}

/* Form footer */
.form-footer{background:var(--surface);border-top:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;bottom:0;z-index:5}
.form-footer-r{display:flex;gap:8px}

/* Toast */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(18px);background:#0f172a;color:#f1f5f9;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 28px rgba(0,0,0,.28);z-index:9999;opacity:0;transition:opacity .2s,transform .2s;display:flex;align-items:center;gap:7px;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast svg{width:15px;height:15px;flex-shrink:0}
.toast.ok svg{color:var(--success)}
.toast.err svg{color:var(--danger)}

/* Warning banner */
.warning{background:#fffbeb;border:1px solid #fde68a;border-radius:var(--rs);padding:10px 14px;font-size:12.5px;color:#92400e;display:flex;align-items:flex-start;gap:8px;margin-bottom:16px}
.warning svg{width:15px;height:15px;flex-shrink:0;color:#d97706;margin-top:1px}

/* Succes knop (test widget) */
.btn-success{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;box-shadow:0 2px 8px rgba(34,197,94,.25)}
.btn-success:hover{opacity:.9}

/* Verborgen file input voor import */
#import-file-input{position:fixed;top:-9999px;opacity:0;pointer-events:none}

/* Responsive */
@media(max-width:900px){.form-grid{grid-template-columns:1fr}.form-col:last-child{order:-1}}
@media(max-width:640px){.sidebar{display:none}.content{padding:14px}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.477 2 2 6.477 2 12c0 1.821.487 3.53 1.338 5L2.5 21.5l4.5-.838A9.955 9.955 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2z"/></svg>
      </div>
      <div>
        <div class="logo-name">Widget Builder</div>
        <div class="logo-sub">lokaal · jouw apparaat</div>
      </div>
    </div>
    <nav class="nav">
      <div class="nav-section">Beheer</div>
      <button class="nav-btn active" id="nav-widgets">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
        Widgets
        <span class="nav-count" id="nav-count">0</span>
      </button>
      <div class="nav-section" style="margin-top:10px">Configuratie</div>
      <button class="nav-btn" id="nav-settings">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        Widget.js URL
      </button>
    </nav>
    <div class="sidebar-footer">Gegevens opgeslagen in browser</div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <span class="topbar-title" id="topbar-title">Widgets</span>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<!-- Settings modal -->
<div class="modal-overlay hidden" id="settings-modal">
  <div class="modal">
    <div class="modal-head">
      <h3>Widget.js URL instellen</h3>
      <button class="btn btn-ghost btn-icon" id="settings-close">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <p style="font-size:13px;color:#64748b">Dit is de URL waar jij <code style="background:#f1f5f9;padding:1px 5px;border-radius:4px;font-size:12px">widget.js</code> host. Klanten laden de widget via deze URL. Upload het bestand naar jouw eigen domein of server.</p>
      <div class="field">
        <label>URL naar widget.js</label>
        <input class="input input-mono" id="settings-url" type="url" placeholder="https://jouwebsite.nl/widget.js" />
        <small>Voorbeeld: https://sila.ai/widget.js</small>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" id="settings-cancel">Annuleren</button>
      <button class="btn btn-primary" id="settings-save">Opslaan</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <svg viewBox="0 0 24 24" fill="currentColor" id="toast-icon"></svg>
  <span id="toast-msg"></span>
</div>

<script>
(function(){
'use strict';

// ── Opslag ──────────────────────────────────────────────────────────────────

var LS_WIDGETS  = 'cw_db_widgets';
var LS_SETTINGS = 'cw_db_settings';

function loadWidgets(){
  try{ return JSON.parse(localStorage.getItem(LS_WIDGETS)) || []; }catch(e){ return []; }
}
function saveWidgets(arr){
  localStorage.setItem(LS_WIDGETS, JSON.stringify(arr));
}
function loadSettings(){
  try{ return JSON.parse(localStorage.getItem(LS_SETTINGS)) || {}; }catch(e){ return {}; }
}
function saveSettings(obj){
  localStorage.setItem(LS_SETTINGS, JSON.stringify(obj));
}

// ── Staat ────────────────────────────────────────────────────────────────────

var state = {
  widgets:   loadWidgets(),
  settings:  loadSettings(),
  editingId: null,
  view:      'list'
};

// ── Hulpfuncties ────────────────────────────────────────────────────────────

function uid(){
  return Date.now().toString(36) + Math.random().toString(36).substr(2,6);
}
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function trunc(s,n){
  s=String(s||''); return s.length>n?s.substr(0,n)+'…':s;
}
function fmtDate(iso){
  if(!iso) return '';
  var d=new Date(iso);
  return d.toLocaleDateString('nl-NL',{day:'numeric',month:'short',year:'numeric'});
}
function hexToRgba(hex,a){
  var m=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  if(!m) return 'rgba(0,0,0,'+a+')';
  return 'rgba('+parseInt(m[1],16)+','+parseInt(m[2],16)+','+parseInt(m[3],16)+','+a+')';
}

// ── Toast ────────────────────────────────────────────────────────────────────

var toastTimer=null;
function toast(msg,type){
  var el=document.getElementById('toast');
  var ic=document.getElementById('toast-icon');
  var ms=document.getElementById('toast-msg');
  el.className='toast '+(type==='err'?'err':'ok');
  ic.innerHTML=type==='err'
    ?'<path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>'
    :'<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>';
  ms.textContent=msg;
  clearTimeout(toastTimer);
  el.classList.add('show');
  toastTimer=setTimeout(function(){ el.classList.remove('show'); },3000);
}

function copyText(t){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).catch(function(){ fallbackCopy(t); });
  } else { fallbackCopy(t); }
}
function fallbackCopy(t){
  var ta=document.createElement('textarea');
  ta.value=t; ta.style.cssText='position:fixed;top:-9999px';
  document.body.appendChild(ta); ta.select(); document.execCommand('copy');
  document.body.removeChild(ta);
}

// ── Embed code genereren ────────────────────────────────────────────────────

function makeEmbedCode(w){
  var url = (state.settings.widgetJsUrl||'').trim() || 'https://jouwebsite.nl/widget.js';
  var cfg = {
    webhookUrl: w.webhookUrl,
    branding:   w.branding,
    theme:      w.theme
  };
  // Gebruik HTML-veilige encoding voor het JSON-attribuut
  var json = JSON.stringify(cfg);
  var encoded = json.replace(/'/g,'&#39;');
  return '<script\n  src="'+url+'"\n  data-config=\''+encoded+'\'>\n<\/script>';
}

// ── Live preview bijwerken ──────────────────────────────────────────────────

var prevTimer=null;
function schedulePreview(){ clearTimeout(prevTimer); prevTimer=setTimeout(doPreview,200); }
function doPreview(){
  var form=document.getElementById('widget-form'); if(!form) return;
  var primary   = form.querySelector('[name="theme.primaryColor"]').value||'#6366f1';
  var secondary = form.querySelector('[name="theme.secondaryColor"]').value||'#4f46e5';
  var logoUrl   = form.querySelector('[name="branding.logoUrl"]').value||'';
  var name      = form.querySelector('[name="branding.name"]').value||'Chat';
  var toggle    = form.querySelector('[name="branding.toggleLabel"]').value||'Stel ons een vraag';
  var welcome   = form.querySelector('[name="branding.welcomeText"]').value||'Hallo! Hoe kan ik u helpen?';
  var grad      = 'linear-gradient(135deg,'+primary+','+secondary+')';

  var ph=document.querySelector('.ph'); if(ph) ph.style.background=grad;
  var phLogo=document.querySelector('.ph-logo');
  if(phLogo){
    phLogo.innerHTML=logoUrl
      ?'<img src="'+esc(logoUrl)+'" alt="" onerror="this.style.display=\'none\'" />'
      :'<svg viewBox="0 0 24 24" width="11" height="11" fill="white"><path d="M12 2C6.477 2 2 6.477 2 12c0 1.82.49 3.53 1.34 5L2.5 21.5l4.5-.84A9.96 9.96 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg>';
  }
  var phName=document.querySelector('.ph-name'); if(phName) phName.textContent=trunc(name,20);
  var botMsgs=document.querySelectorAll('.pm-msg.pm-bot'); if(botMsgs[0]) botMsgs[0].textContent=trunc(welcome,55);
  document.querySelectorAll('.pm-msg.pm-user').forEach(function(m){ m.style.background=grad; });
  var piSend=document.querySelector('.pi-send'); if(piSend) piSend.style.background=grad;
  var pt=document.querySelector('.pt');
  if(pt){
    pt.style.background=grad;
    var ptLbl=pt.querySelector('.pt-lbl'); if(ptLbl) ptLbl.textContent=trunc(toggle,22);
  }
}

// ── Embed code preview bijwerken ────────────────────────────────────────────

function updateEmbed(){
  var sec=document.getElementById('embed-section');
  var pre=document.getElementById('embed-pre');
  if(!sec||!pre) return;
  if(!state.editingId){ sec.classList.add('hidden'); return; }
  var w=state.widgets.find(function(x){ return x.id===state.editingId; });
  if(!w){ sec.classList.add('hidden'); return; }
  sec.classList.remove('hidden');
  pre.textContent=makeEmbedCode(w);
}

// ── Color picker synchronisatie ─────────────────────────────────────────────

function initColors(form){
  var pp=form.querySelector('[name="theme.primaryColor"]');
  var ph=form.querySelector('[name="theme.primaryHex"]');
  var sp=form.querySelector('[name="theme.secondaryColor"]');
  var sh=form.querySelector('[name="theme.secondaryHex"]');

  pp.addEventListener('input',function(){ ph.value=pp.value; syncPresets(form,pp.value); schedulePreview(); });
  ph.addEventListener('input',function(){ if(/^#[0-9a-f]{6}$/i.test(ph.value)){ pp.value=ph.value; syncPresets(form,ph.value); schedulePreview(); } });
  sp.addEventListener('input',function(){ sh.value=sp.value; schedulePreview(); });
  sh.addEventListener('input',function(){ if(/^#[0-9a-f]{6}$/i.test(sh.value)){ sp.value=sh.value; schedulePreview(); } });

  form.querySelectorAll('.preset').forEach(function(btn){
    btn.addEventListener('click',function(){
      pp.value=ph.value=btn.dataset.p;
      sp.value=sh.value=btn.dataset.s;
      syncPresets(form,btn.dataset.p);
      schedulePreview();
    });
  });
}
function syncPresets(form,val){
  form.querySelectorAll('.preset').forEach(function(b){ b.classList.toggle('on',b.dataset.p===val); });
}

function mkPreset(p,s,lbl){
  return '<div class="preset" data-p="'+p+'" data-s="'+s+'" title="'+lbl+'" style="background:linear-gradient(135deg,'+p+','+s+')"></div>';
}

function showList(){

    '<div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap">'+
      '<button class="btn btn-ghost" id="btn-import" title="Importeer backup JSON">'+
        '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>'+
        'Importeer'+
      '</button>'+
      '<button class="btn btn-ghost" id="btn-export" title="Exporteer alle widgets als JSON backup">'+
        '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 12v7H5v-7H3v7c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-7h-2zm-6 .67l2.59-2.58L17 11.5l-5 5-5-5 1.41-1.41L11 12.67V3h2v9.67z"/></svg>'+
        'Exporteer'+
      '</button>'+
      '<button class="btn btn-primary" id="btn-new">'+
        '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>'+
        'Nieuwe widget'+
      '</button>'+
    '</div>';
  cnt.appendChild(hdr);

  // Verborgen file input voor import (eenmalig aanmaken)
  if(!document.getElementById('import-file-input')){
    var fi=document.createElement('input');
    fi.type='file'; fi.id='import-file-input'; fi.accept='.json';
    document.body.appendChild(fi);
    fi.addEventListener('change',function(){
      var file=fi.files[0]; if(!file) return;
      var reader=new FileReader();
      reader.onload=function(e){
        try{
          var imported=JSON.parse(e.target.result);
          if(!Array.isArray(imported)) throw new Error('Geen geldige array');
          var added=0;
          imported.forEach(function(w){
            if(!w.id||!w.webhookUrl) return;
            var exists=state.widgets.some(function(x){ return x.id===w.id; });
            if(!exists){ state.widgets.push(w); added++; }
          });
          saveWidgets(state.widgets);
          renderCards();
          toast(added+' widget(s) geïmporteerd!');
        } catch(err){
          toast('Ongeldige JSON: '+err.message,'err');
        }
        fi.value='';
      };
      reader.readAsText(file);
    });
  }

  var grid=document.createElement('div');
  grid.className='grid'; grid.id='widget-grid';
  cnt.appendChild(grid);

  renderCards();
  document.getElementById('btn-new').addEventListener('click',function(){ showForm(null); });
  document.getElementById('btn-export').addEventListener('click', exportWidgets);
  document.getElementById('btn-import').addEventListener('click',function(){ document.getElementById('import-file-input').click(); });
  document.getElementById('nav-count').textContent=state.widgets.length;
}

              '<div class="ph-logo"><svg viewBox="0 0 24 24" width="11" height="11" fill="white"><path d="M12 2C6.477 2 2 6.477 2 12c0 1.82.49 3.53 1.34 5L2.5 21.5l4.5-.84A9.96 9.96 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg></div>'+
              '<div class="ph-name">'+esc(b.name||'Chat')+'</div>'+
            '</div>'+
            '<div class="pm">'+
              '<div class="pm-msg pm-bot">'+esc(trunc(b.welcomeText||'Hallo! Hoe kan ik u helpen?',55))+'</div>'+
              '<div class="pm-msg pm-user" style="background:linear-gradient(135deg,'+esc(pc)+','+esc(sc)+')">Hallo, ik heb een vraag</div>'+
              '<div class="pm-msg pm-bot">Natuurlijk, ik help u graag!</div>'+
            '</div>'+
            '<div class="pi">'+
              '<div class="pi-field"></div>'+
              '<div class="pi-send" style="background:linear-gradient(135deg,'+esc(pc)+','+esc(sc)+')"></div>'+
            '</div>'+
          '</div>'+

          // Toggle
          '<div class="pt" style="background:linear-gradient(135deg,'+esc(pc)+','+esc(sc)+')">'+
            '<svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 1.82.49 3.53 1.34 5L2.5 21.5l4.5-.84A9.96 9.96 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg>'+
            '<span class="pt-lbl">'+esc(trunc(b.toggleLabel||'Stel ons een vraag',22))+'</span>'+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
  '</div>'+

  '</div>'+
  '</form>';

  cnt.appendChild(formWrap);

  // Sticky footer
  var footer=document.createElement('div');
  footer.className='form-footer';
  footer.innerHTML=
    '<button type="button" class="btn btn-danger'+(isNew?' hidden':'')+'" id="btn-delete">'+
      '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>'+
      'Verwijderen'+
    '</button>'+
    '<div class="form-footer-r">'+
      '<button type="button" class="btn btn-secondary" id="btn-cancel">Annuleren</button>'+
      '<button type="button" class="btn btn-success'+(isNew?' hidden':'')+'" id="btn-test-form">'+
        '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>'+
        'Test widget'+
      '</button>'+
      '<button type="button" class="btn btn-primary" id="btn-save">'+
        '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>'+
        'Opslaan'+
      '</button>'+
    '</div>';
  cnt.appendChild(footer);

  // Events
  var form=document.getElementById('widget-form');
  form.addEventListener('input', schedulePreview);
  initColors(form);
  document.getElementById('btn-save').addEventListener('click', function(){
    saveWidget();
  });
  document.getElementById('btn-back').addEventListener('click', showList);
  document.getElementById('btn-cancel').addEventListener('click', showList);
  document.getElementById('btn-delete').addEventListener('click', deleteWidget);
  document.getElementById('btn-test-form').addEventListener('click',function(){
    var w=state.widgets.find(function(x){ return x.id===state.editingId; });
    if(w) testWidget(w); else toast('Sla de widget eerst op.','err');
  });

  var copyBtn=document.getElementById('embed-copy-btn');
  if(copyBtn){
    copyBtn.addEventListener('click',function(){
      var pre=document.getElementById('embed-pre'); if(!pre) return;
      if(!state.settings.widgetJsUrl){ toast('Stel eerst de widget.js URL in.','err'); return; }
      copyText(pre.textContent);
      copyBtn.textContent='Gekopieerd!'; copyBtn.classList.add('ok');
      setTimeout(function(){ copyBtn.textContent='Kopieer'; copyBtn.classList.remove('ok'); },2000);
    });
  }

  updateEmbed();
  syncPresets(form, pc);
  schedulePreview();
  document.querySelector('#nav-widgets').classList.remove('active');
}

// ── Opslaan ──────────────────────────────────────────────────────────────────

function saveWidget(){
  var form=document.getElementById('widget-form');
  var saveBtn=document.getElementById('btn-save');

  function get(n){ var el=form.querySelector('[name="'+n+'"]'); return el?el.value.trim():''; }

  var name=get('name'); var webhookUrl=get('webhookUrl');
  if(!name){ toast('Vul een naam in.','err'); return; }
  if(!webhookUrl){ toast('Vul een webhook URL in.','err'); return; }

  var data={
    name:name, webhookUrl:webhookUrl,
    branding:{
      name:get('branding.name'),
      logoUrl:get('branding.logoUrl'),
      welcomeText:get('branding.welcomeText'),
      toggleLabel:get('branding.toggleLabel'),
      inputPlaceholder:get('branding.inputPlaceholder'),
      sendLabel:get('branding.sendLabel')
    },
    theme:{
      primaryColor:get('theme.primaryColor'),
      secondaryColor:get('theme.secondaryColor')
    }
  };

  var origHtml=saveBtn.innerHTML;
  saveBtn.disabled=true; saveBtn.innerHTML='Opslaan...';

  setTimeout(function(){
    if(state.editingId){
      var idx=state.widgets.findIndex(function(x){ return x.id===state.editingId; });
      if(idx>=0){
        data.id=state.editingId;
        data.createdAt=state.widgets[idx].createdAt;
        data.updatedAt=new Date().toISOString();
        state.widgets[idx]=data;
      }
    } else {
      data.id=uid();
      data.createdAt=new Date().toISOString();
      data.updatedAt=data.createdAt;
      state.widgets.unshift(data);
      state.editingId=data.id;
    }
    saveWidgets(state.widgets);

    // Embed code tonen nu we een id hebben
    updateEmbed();

    saveBtn.disabled=false; saveBtn.innerHTML=origHtml;

    // Delete + test knop tonen na eerste opslaan
    var delBtn=document.getElementById('btn-delete');
    if(delBtn) delBtn.classList.remove('hidden');
    var testBtn=document.getElementById('btn-test-form');
    if(testBtn) testBtn.classList.remove('hidden');

    document.getElementById('nav-count').textContent=state.widgets.length;
    showEmbedView(data);
  },50);
}

// ── Embed-code pagina na opslaan ──────────────────────────────────────────────

  state.view='embed';
  document.getElementById('topbar-title').textContent='Embed code';
  document.querySelector('#nav-widgets').classList.remove('active');

  var cnt=document.getElementById('content');
  cnt.innerHTML='';

  hdr.innerHTML=
    '<button class="btn btn-ghost" id="emb-back">'+

      'Naar overzicht'+
    '</button>'+
    '<span style="background:#dcfce7;color:#166534;border-radius:99px;padding:4px 14px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px">'+
      '<svg viewBox="0 0 24 24" fill="currentColor" style="width:13px;height:13px"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>'+
      'Opgeslagen!'+
    '</span>';
  cnt.appendChild(hdr);

  var wrap=document.createElement('div');
  wrap.style.cssText='max-width:640px;display:flex;flex-direction:column;gap:20px';
  cnt.appendChild(wrap);

  // ── Embed Code sectie ──
  var es=document.createElement('div');
  es.className='section';
  wrap.appendChild(es);
  es.innerHTML=
    '<div class="section-head">'+
      '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>'+
      '<h3>Embed Code</h3>'+
    '</div>'+
    '<div class="section-body">'+
      '<p style="font-size:13px;color:#64748b;margin:0">Add this script tag to your website to display the chat widget.</p>'+
      '<div class="embed-wrap" style="margin-top:10px">'+
        '<pre class="embed-code" id="ev-pre"></pre>'+
        '<button type="button" class="embed-copy" id="ev-copy">Kopieer</button>'+
      '</div>'+
    '</div>';

  document.getElementById('ev-pre').textContent=embedCode;

  // ── Quick Start sectie ──
  var qs=document.createElement('div');
  qs.className='section';
  wrap.appendChild(qs);
  qs.innerHTML=
    '<div class="section-head">'+
      '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>'+
      '<h3>Quick Start</h3>'+
    '</div>'+
    '<div class="section-body" style="gap:14px">'+
      '<div style="display:flex;gap:14px;align-items:flex-start">'+
        '<span style="min-width:26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">1</span>'+
        '<p style="font-size:13.5px;margin:3px 0 0;color:var(--text)">Copy the embed code above</p>'+
      '</div>'+
      '<div style="display:flex;gap:14px;align-items:flex-start">'+
        '<span style="min-width:26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">2</span>'+
        '<p style="font-size:13.5px;margin:3px 0 0;color:var(--text)">Paste it before the closing <code style="background:#f1f5f9;padding:2px 6px;border-radius:5px;font-size:11.5px">&lt;/body&gt;</code> tag on your website</p>'+
      '</div>'+
      '<div style="display:flex;gap:14px;align-items:flex-start">'+
        '<span style="min-width:26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">3</span>'+

  // Events
  document.getElementById('emb-back').addEventListener('click', showList);

  document.getElementById('ev-copy').addEventListener('click',function(){
    // Gebruik execCommand (werkt altijd, ook op file://)
    var ta=document.createElement('textarea');
    ta.value=embedCode; ta.style.cssText='position:fixed;top:-9999px;left:-9999px';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try{ document.execCommand('copy'); } catch(e){}

// ── Verwijderen ──────────────────────────────────────────────────────────────

function deleteWidget(){
  if(!state.editingId) return;
  var w=state.widgets.find(function(x){ return x.id===state.editingId; });
  if(!confirm('Weet je zeker dat je "'+(w?w.name:'dit widget')+'" wilt verwijderen?')) return;
  state.widgets=state.widgets.filter(function(x){ return x.id!==state.editingId; });
  saveWidgets(state.widgets);
  toast('Widget verwijderd.');
  showList();
}

// ── Widget testen in popup ────────────────────────────────────────────────────

function testWidget(w){
  var url=(state.settings.widgetJsUrl||'').trim();
  if(!url){
    toast('Stel eerst de widget.js URL in via "Widget.js URL" in de sidebar.','err');
    return;
  }
  var cfg={webhookUrl:w.webhookUrl,branding:w.branding,theme:w.theme};
  var json=JSON.stringify(cfg).replace(/'/g,'&#39;').replace(/"/g,'&quot;');
  var html='<!DOCTYPE html>'+
    '<html lang="nl"><head><meta charset="UTF-8">'+
    '<meta name="viewport" content="width=device-width,initial-scale=1">'+
    '<title>Widget test – '+esc(w.name)+'</title>'+
    '<style>body{font-family:system-ui,sans-serif;background:#f8fafc;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#334155}'+
    '.box{text-align:center;max-width:360px}.box h2{font-size:18px;font-weight:600;margin-bottom:8px}'+
    '.box p{font-size:13px;color:#64748b;margin-bottom:4px}.tag{display:inline-block;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:6px;padding:3px 10px;font-size:11px;font-family:monospace;color:#475569;margin-top:4px}'+
    '</style></head><body>'+
    '<div class="box">'+
      '<h2>Widget testpagina</h2>'+
      '<p>De chatwidget verschijnt rechtsonder in beeld.</p>'+
      '<p style="margin-top:12px;font-size:12px;color:#94a3b8">Webhook:</p>'+
      '<div class="tag">'+esc(trunc(w.webhookUrl,48))+'</div>'+
    '</div>'+
    '<script src="'+url+'" data-config=\''+json+'\'><\/script>'+
    '</body></html>';

  var popup=window.open('','_blank','width=500,height=700,resizable=yes');
  if(popup){ popup.document.write(html); popup.document.close(); }
  else { toast('Popup geblokkeerd door browser. Sta popups toe voor dit bestand.','err'); }
}

// ── Widget dupliceren ────────────────────────────────────────────────────────

function duplicateWidget(id){
  var w=state.widgets.find(function(x){ return x.id===id; });
  if(!w) return;
  var clone=JSON.parse(JSON.stringify(w));
  clone.id=uid();
  clone.name='Kopie van '+w.name;
  if(clone.branding) clone.branding=Object.assign({},w.branding);
  if(clone.theme)    clone.theme=Object.assign({},w.theme);
  clone.createdAt=new Date().toISOString();
  clone.updatedAt=clone.createdAt;
  state.widgets.splice(state.widgets.indexOf(w)+1,0,clone);
  saveWidgets(state.widgets);
  renderCards();
  toast('"'+clone.name+'" aangemaakt.');
}

// ── Export widgets ───────────────────────────────────────────────────────────

function exportWidgets(){
  if(state.widgets.length===0){ toast('Geen widgets om te exporteren.','err'); return; }
  var json=JSON.stringify(state.widgets,null,2);
  var blob=new Blob([json],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='cw-widgets-backup-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){ URL.revokeObjectURL(url); document.body.removeChild(a); },100);
  toast(state.widgets.length+' widget(s) geëxporteerd.');
}

// ── Settings modal ────────────────────────────────────────────────────────────

function openSettings(){
  var modal=document.getElementById('settings-modal');
  document.getElementById('settings-url').value=state.settings.widgetJsUrl||'';
  modal.classList.remove('hidden');
}

document.getElementById('settings-close').addEventListener('click',function(){
  document.getElementById('settings-modal').classList.add('hidden');
});
document.getElementById('settings-cancel').addEventListener('click',function(){
  document.getElementById('settings-modal').classList.add('hidden');
});
document.getElementById('settings-save').addEventListener('click',function(){
  var url=document.getElementById('settings-url').value.trim();
  state.settings.widgetJsUrl=url;
  saveSettings(state.settings);
  document.getElementById('settings-modal').classList.add('hidden');
  updateEmbed();
  toast('URL opgeslagen!');
});
document.getElementById('settings-modal').addEventListener('click',function(e){
  if(e.target===this) this.classList.add('hidden');
});

// Sidebar navigatie
document.getElementById('nav-widgets').addEventListener('click',function(){ showList(); });
document.getElementById('nav-settings').addEventListener('click', openSettings);

// ── Start ─────────────────────────────────────────────────────────────────────

showList();

}());
