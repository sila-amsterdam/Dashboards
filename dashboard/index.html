<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Widget Dashboard</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <div class="db-layout">

    <!-- ── Sidebar ── -->
    <aside class="db-sidebar">
      <div class="db-logo">
        <div class="db-logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
            <path d="M12 2C6.477 2 2 6.477 2 12c0 1.821.487 3.53 1.338 5L2.5 21.5l4.5-.838A9.955 9.955 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2z"/>
          </svg>
        </div>
        <div>
          <div class="db-logo-name">Widget Platform</div>
          <div class="db-logo-sub">Chat Widget Dashboard</div>
        </div>
      </div>

      <nav class="db-nav">
        <div class="db-nav-section">Beheer</div>

        <button class="db-nav-item active" data-view="list">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/>
          </svg>
          Widgets
          <span class="db-nav-badge" id="db-nav-badge-sidebar">0</span>
        </button>

        <div class="db-nav-section" style="margin-top:12px">Informatie</div>

        <a class="db-nav-item" href="#" onclick="openDocs(); return false;">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"/>
          </svg>
          Documentatie
        </a>

        <a class="db-nav-item" href="#" onclick="openApiTest(); return false;">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
          API testen
        </a>
      </nav>

      <div class="db-sidebar-footer">
        Chat Widget Platform v1.0
      </div>
    </aside>

    <!-- ── Hoofdinhoud ── -->
    <main class="db-main">

      <!-- Top bar -->
      <div class="db-topbar">
        <span class="db-topbar-title" id="db-topbar-title">Widgets</span>
        <span class="db-topbar-sub" id="db-topbar-sub"></span>
      </div>

      <!-- Content (views worden hier door JS geïnjecteerd) -->
      <div class="db-content" id="db-content"></div>

    </main>
  </div>

  <script src="dashboard.js"></script>
  <script>
    function openDocs() {
      window.open('../docs/integration-guide.md', '_blank');
    }

    function openApiTest() {
      var apiBase = window.location.origin;
      var html = '<!DOCTYPE html><html><head><title>API Tester</title><style>body{font-family:system-ui;padding:24px;background:#f1f5f9}h2{margin-bottom:16px}input,textarea{width:100%;padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-family:monospace;font-size:13px;margin-bottom:8px}button{padding:8px 16px;background:#6366f1;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px}pre{background:#0f172a;color:#e2e8f0;padding:16px;border-radius:8px;overflow:auto;font-size:12px;margin-top:12px}</style></head><body><h2>API Tester – ' + apiBase + '</h2><p>Open de browser console of gebruik onderstaand formulier om de API te testen.</p><label>GET /api/widgets<br/><button onclick=\'fetch("' + apiBase + '/api/widgets").then(r=>r.json()).then(d=>{document.getElementById("out").textContent=JSON.stringify(d,null,2)})\'>Alle widgets ophalen</button></label><pre id="out">Klik op een knop om te testen...</pre></body></html>';
      var w = window.open('', '_blank');
      w.document.write(html);
      w.document.close();
    }
  </script>
</body>
</html>
