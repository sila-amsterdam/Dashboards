<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Widget Dashboard</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --sidebar-w:240px;--sidebar-bg:#0f172a;--sidebar-hover:rgba(255,255,255,.06);
      --sidebar-active:rgba(255,255,255,.1);--sidebar-text:#94a3b8;--sidebar-text-active:#f1f5f9;
      --surface:#ffffff;--bg:#f1f5f9;--border:#e2e8f0;--text:#0f172a;--text-muted:#64748b;
      --text-subtle:#94a3b8;--radius:14px;--radius-sm:9px;
      --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
      --shadow-lg:0 8px 32px rgba(0,0,0,.12);--primary:#6366f1;--primary-dark:#4f46e5;
      --primary-light:rgba(99,102,241,.1);--danger:#ef4444;--danger-light:rgba(239,68,68,.1);
      --success:#22c55e;--font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    }
    body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;font-size:14px;}
    .db-layout{display:flex;min-height:100vh;}
    .db-sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--sidebar-bg);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;flex-shrink:0;}
    .db-logo{display:flex;align-items:center;gap:10px;padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.06);}
    .db-logo-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#4f46e5);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .db-logo-name{font-size:14px;font-weight:600;color:var(--sidebar-text-active);letter-spacing:-.01em;}
    .db-logo-sub{font-size:10px;color:var(--sidebar-text);margin-top:1px;}
    .db-nav{flex:1;padding:12px 10px;display:flex;flex-direction:column;gap:2px;}
    .db-nav-section{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(148,163,184,.5);padding:10px 8px 4px;}
    .db-nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;color:var(--sidebar-text);text-decoration:none;font-size:13.5px;font-weight:500;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;transition:background .12s,color .12s;}
    .db-nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.7;}
    .db-nav-item:hover{background:var(--sidebar-hover);color:var(--sidebar-text-active);}
    .db-nav-item:hover svg{opacity:1;}
    .db-nav-item.active{background:var(--sidebar-active);color:var(--sidebar-text-active);}
    .db-nav-item.active svg{opacity:1;}
    .db-nav-badge{margin-left:auto;background:rgba(99,102,241,.25);color:#a5b4fc;font-size:10px;font-weight:600;padding:1px 6px;border-radius:99px;min-width:18px;text-align:center;}
    .db-sidebar-footer{padding:14px 18px;border-top:1px solid rgba(255,255,255,.06);font-size:11px;color:rgba(148,163,184,.4);}
    .db-main{flex:1;min-width:0;display:flex;flex-direction:column;}
    .db-topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:10;}
    .db-topbar-title{font-size:15px;font-weight:600;flex:1;}
    .db-topbar-sub{font-size:12px;color:var(--text-muted);margin-left:4px;font-weight:400;}
    .db-content{padding:28px;flex:1;}
    .db-hidden{display:none!important;}
    .db-btn{display:inline-flex;align-items:center;gap:7px;padding:0 16px;height:36px;border-radius:var(--radius-sm);border:none;font-size:13px;font-weight:500;font-family:var(--font);cursor:pointer;transition:opacity .15s,transform .1s,box-shadow .15s;text-decoration:none;white-space:nowrap;}
    .db-btn svg{width:15px;height:15px;flex-shrink:0;}
    .db-btn:active{transform:scale(.97);}
    .db-btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;box-shadow:0 2px 8px rgba(99,102,241,.3);}
    .db-btn-primary:hover{opacity:.9;box-shadow:0 4px 14px rgba(99,102,241,.4);}
    .db-btn-secondary{background:var(--surface);color:var(--text);border:1.5px solid var(--border);}
    .db-btn-secondary:hover{background:var(--bg);border-color:#cbd5e1;}
    .db-btn-danger{background:var(--danger-light);color:var(--danger);border:1.5px solid rgba(239,68,68,.2);}
    .db-btn-danger:hover{background:rgba(239,68,68,.16);}
    .db-btn-ghost{background:transparent;color:var(--text-muted);padding:0 10px;}
    .db-btn-ghost:hover{background:var(--bg);color:var(--text);}
    .db-btn-icon{width:36px;padding:0;justify-content:center;}
    .db-cards-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap;}
    .db-cards-header h2{font-size:18px;font-weight:600;letter-spacing:-.02em;}
    .db-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}
    .db-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden;transition:box-shadow .2s,transform .2s;display:flex;flex-direction:column;}
    .db-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);}
    .db-card-stripe{height:6px;}
    .db-card-body{padding:18px 20px 16px;flex:1;display:flex;flex-direction:column;gap:12px;}
    .db-card-top{display:flex;align-items:flex-start;gap:14px;}
    .db-card-avatar{width:42px;height:42px;border-radius:12px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--bg);border:1px solid var(--border);}
    .db-card-avatar img{width:100%;height:100%;object-fit:contain;}
    .db-card-avatar-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
    .db-card-info{flex:1;min-width:0;}
    .db-card-name{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .db-card-brand{font-size:12px;color:var(--text-muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .db-card-meta{font-size:11px;color:var(--text-subtle);display:flex;align-items:center;gap:5px;}
    .db-card-meta svg{width:12px;height:12px;opacity:.6;}
    .db-card-webhook{font-size:11px;color:var(--text-subtle);background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-family:'SF Mono','Cascadia Code',Consolas,monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:default;}
    .db-card-actions{display:flex;gap:8px;padding:12px 20px;border-top:1px solid var(--border);background:var(--bg);}
    .db-card-actions .db-btn{flex:1;justify-content:center;}
    .db-empty{grid-column:1/-1;text-align:center;padding:60px 20px;display:flex;flex-direction:column;align-items:center;gap:12px;}
    .db-empty-icon{width:56px;height:56px;border-radius:16px;background:var(--primary-light);display:flex;align-items:center;justify-content:center;color:var(--primary);}
    .db-empty h3{font-size:16px;font-weight:600;}
    .db-empty p{font-size:13px;color:var(--text-muted);max-width:280px;}
    .db-skeleton{background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);background-size:200% 100%;animation:db-shimmer 1.4s infinite;border-radius:6px;}
    @keyframes db-shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .db-form-layout{display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start;}
    .db-form-col{display:flex;flex-direction:column;gap:20px;}
    .db-section{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;}
    .db-section-header{padding:16px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
    .db-section-header h3{font-size:13px;font-weight:600;letter-spacing:-.01em;}
    .db-section-header svg{width:16px;height:16px;color:var(--text-muted);}
    .db-section-body{padding:20px;display:flex;flex-direction:column;gap:16px;}
    .db-field{display:flex;flex-direction:column;gap:5px;}
    .db-field label{font-size:12px;font-weight:500;color:var(--text-muted);}
    .db-field small{font-size:11px;color:var(--text-subtle);margin-top:-2px;}
    .db-input,.db-textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13.5px;font-family:var(--font);color:var(--text);background:var(--surface);outline:none;transition:border-color .15s,box-shadow .15s;}
    .db-input:focus,.db-textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light);}
    .db-input::placeholder,.db-textarea::placeholder{color:var(--text-subtle);}
    .db-textarea{resize:vertical;min-height:76px;line-height:1.55;}
    .db-input-url{font-family:'SF Mono','Cascadia Code',Consolas,monospace;font-size:12.5px;}
    .db-color-row{display:flex;gap:8px;align-items:center;}
    .db-color-input{width:40px;height:38px;border-radius:8px;border:1.5px solid var(--border);padding:2px;cursor:pointer;background:none;flex-shrink:0;}
    .db-color-input::-webkit-color-swatch-wrapper{padding:0;}
    .db-color-input::-webkit-color-swatch{border-radius:5px;border:none;}
    .db-color-hex{flex:1;font-family:'SF Mono','Cascadia Code',Consolas,monospace;font-size:13px;text-transform:lowercase;}
    .db-color-presets{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
    .db-color-preset{width:22px;height:22px;border-radius:6px;border:2px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s;}
    .db-color-preset:hover{transform:scale(1.2);}
    .db-color-preset.active{border-color:var(--text);}
    .db-embed-block{position:relative;}
    .db-embed-code{background:#0f172a;color:#e2e8f0;border-radius:var(--radius-sm);padding:14px 16px;font-family:'SF Mono','Cascadia Code',Consolas,monospace;font-size:12px;line-height:1.7;overflow-x:auto;white-space:pre;border:1px solid rgba(255,255,255,.08);max-height:220px;overflow-y:auto;}
    .db-embed-copy{position:absolute;top:10px;right:10px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);color:#94a3b8;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:var(--font);transition:background .15s,color .15s;}
    .db-embed-copy:hover{background:rgba(255,255,255,.18);color:#e2e8f0;}
    .db-embed-copy.copied{color:#86efac;}
    .db-embed-note{font-size:12px;color:#64748b;margin-top:8px;line-height:1.5;}
    .db-preview-wrap{position:relative;height:360px;background:#f1f5f9;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);}
    .db-preview-label{position:absolute;top:10px;left:10px;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-subtle);background:rgba(255,255,255,.85);padding:3px 8px;border-radius:99px;border:1px solid var(--border);}
    .db-preview-window{position:absolute;bottom:72px;right:14px;width:240px;height:260px;background:#fff;border-radius:12px;box-shadow:0 8px 30px rgba(15,23,42,.25);overflow:hidden;display:flex;flex-direction:column;border:1px solid rgba(0,0,0,.1);}
    .db-preview-header{padding:9px 12px;display:flex;align-items:center;gap:8px;color:#fff;flex-shrink:0;}
    .db-preview-logo{width:22px;height:22px;border-radius:5px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
    .db-preview-logo img{width:100%;height:100%;object-fit:contain;}
    .db-preview-title{font-size:12px;font-weight:600;}
    .db-preview-messages{flex:1;padding:10px;display:flex;flex-direction:column;gap:5px;background:#f3f4f6;overflow:hidden;}
    .db-preview-msg{padding:7px 9px;border-radius:9px;font-size:11px;max-width:85%;line-height:1.4;}
    .db-preview-msg-bot{align-self:flex-start;background:#fff;border:1px solid rgba(0,0,0,.08);}
    .db-preview-msg-user{align-self:flex-end;color:#fff;}
    .db-preview-input{padding:7px 10px;border-top:1px solid rgba(0,0,0,.06);display:flex;gap:5px;background:#fff;flex-shrink:0;}
    .db-preview-input-field{flex:1;height:26px;border-radius:7px;border:1.5px solid #e2e8f0;background:#f9fafb;}
    .db-preview-send{width:26px;height:26px;border-radius:7px;border:none;}
    .db-preview-toggle{position:absolute;bottom:14px;right:14px;height:42px;border-radius:999px;border:none;color:#fff;display:flex;align-items:center;gap:7px;padding:0 14px;font-size:12px;font-weight:500;font-family:var(--font);box-shadow:0 6px 20px rgba(15,23,42,.25);cursor:default;}
    .db-preview-toggle svg{width:16px;height:16px;fill:currentColor;flex-shrink:0;}
    .db-form-footer{background:var(--surface);border-top:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;bottom:0;z-index:5;}
    .db-form-footer-right{display:flex;gap:10px;}
    .db-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#0f172a;color:#f1f5f9;padding:11px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,.3);z-index:10000;opacity:0;transition:opacity .2s,transform .2s;display:flex;align-items:center;gap:8px;pointer-events:none;white-space:nowrap;}
    .db-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .db-toast.success .db-toast-icon{color:var(--success);}
    .db-toast.error .db-toast-icon{color:var(--danger);}
    .db-toast-icon{width:16px;height:16px;flex-shrink:0;}
    .db-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500;}
    .db-badge-neutral{background:#f1f5f9;color:var(--text-muted);border:1px solid var(--border);}
    @media(max-width:900px){.db-form-layout{grid-template-columns:1fr;}.db-form-col:last-child{order:-1;}}
    @media(max-width:640px){.db-sidebar{display:none;}.db-content{padding:16px;}.db-grid{grid-template-columns:1fr;}}
  </style>
</head>
<body>
  <div class="db-layout">
    <aside class="db-sidebar">
      <div class="db-logo">
        <div class="db-logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.477 2 2 6.477 2 12c0 1.821.487 3.53 1.338 5L2.5 21.5l4.5-.838A9.955 9.955 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2z"/></svg>
        </div>
        <div>
          <div class="db-logo-name">Widget Platform</div>
          <div class="db-logo-sub">Chat Widget Dashboard</div>
        </div>
      </div>
      <nav class="db-nav">
        <div class="db-nav-section">Beheer</div>
        <button class="db-nav-item active" data-view="list">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
          Widgets
          <span class="db-nav-badge" id="db-nav-badge-sidebar">0</span>
        </button>
      </nav>
      <div class="db-sidebar-footer">Chat Widget Platform v1.0</div>
    </aside>

    <main class="db-main">
      <div class="db-topbar">
        <span class="db-topbar-title" id="db-topbar-title">Widgets</span>
        <span class="db-topbar-sub" id="db-topbar-sub"></span>
      </div>
      <div class="db-content" id="db-content"></div>
    </main>
  </div>

  <script>
  (function () {
    'use strict';

    // ─── Storage (localStorage) ──────────────────────────────────────────────────

    var STORAGE_KEY = 'cw_widgets_v1';

    function readWidgets() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { return {}; }
    }

    function writeWidgets(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function genId() {
      return Math.random().toString(36).substr(2,6) + Math.random().toString(36).substr(2,6);
    }

    var Store = {
      list: function() { return Object.values(readWidgets()); },
      get:  function(id) { return readWidgets()[id] || null; },
      create: function(data) {
        var widgets = readWidgets();
        var id  = genId();
        var now = new Date().toISOString();
        var w = {
          id: id, name: data.name, webhookUrl: data.webhookUrl,
          branding: Object.assign({name:'',logoUrl:'',welcomeText:'Hallo! Hoe kan ik u helpen?',toggleLabel:'Stel ons een vraag',inputPlaceholder:'Typ uw bericht...',sendLabel:'Verstuur'}, data.branding||{}),
          theme: Object.assign({primaryColor:'#6366f1',secondaryColor:'#4f46e5'}, data.theme||{}),
          createdAt: now, updatedAt: now
        };
        widgets[id] = w;
        writeWidgets(widgets);
        return w;
      },
      update: function(id, data) {
        var widgets = readWidgets();
        if (!widgets[id]) return null;
        var w = widgets[id];
        if (data.name)       w.name       = data.name;
        if (data.webhookUrl) w.webhookUrl = data.webhookUrl;
        if (data.branding)   w.branding   = Object.assign(w.branding, data.branding);
        if (data.theme)      w.theme      = Object.assign(w.theme, data.theme);
        w.updatedAt = new Date().toISOString();
        widgets[id] = w;
        writeWidgets(widgets);
        return w;
      },
      del: function(id) {
        var widgets = readWidgets();
        delete widgets[id];
        writeWidgets(widgets);
      }
    };

    // ─── Staat ───────────────────────────────────────────────────────────────────

    var state = { widgets: [], editingId: null };

    // ─── Toast ───────────────────────────────────────────────────────────────────

    var toastTimer = null;

    function toast(msg, type) {
      var el = document.getElementById('db-toast');
      if (!el) return;
      el.className = 'db-toast ' + (type || 'success');
      el.querySelector('.db-toast-msg').textContent = msg;
      el.querySelector('.db-toast-icon').innerHTML = type === 'error'
        ? '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
      clearTimeout(toastTimer);
      el.classList.add('show');
      toastTimer = setTimeout(function() { el.classList.remove('show'); }, 3000);
    }

    function esc(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function truncate(s, n) { s = String(s||''); return s.length > n ? s.substr(0,n)+'…' : s; }

    function fmtDate(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleDateString('nl-NL',{day:'numeric',month:'short',year:'numeric'});
    }

    // ─── Embed code genereren ────────────────────────────────────────────────────

    function embedCode(widget) {
      var cfg = {
        webhookUrl: widget.webhookUrl,
        branding:   widget.branding || {},
        theme:      widget.theme    || {}
      };
      var configJson = JSON.stringify(cfg).replace(/'/g, '&#39;');
      return '<script\n' +
        '  src="JOUW-WIDGET-URL/widget.js"\n' +
        '  data-config=\'' + configJson + '\'>\n' +
        '<\/script>\n\n' +
        '<!-- Of gebruik de zelfstandige versie hieronder (geen hosting nodig): -->\n' +
        '<script data-config=\'' + configJson + '\'>\n' +
        getWidgetCode() + '\n' +
        '<\/script>';
    }

    function getWidgetCode() {

    // ─── Widget kaart renderen ────────────────────────────────────────────────────

    function renderCard(w) {
      var primary   = (w.theme && w.theme.primaryColor)   || '#6366f1';
      var secondary = (w.theme && w.theme.secondaryColor) || '#4f46e5';
      var branding  = w.branding || {};
      var logoUrl   = branding.logoUrl || '';

      var avatarHtml = logoUrl
        ? '<img src="' + esc(logoUrl) + '" alt="" onerror="this.style.display=\'none\'" />'
        : '<div class="db-card-avatar-placeholder"><svg width="22" height="22" viewBox="0 0 24 24" fill="' + esc(primary) + '"><path d="M12 2C6.477 2 2 6.477 2 12c0 1.82.49 3.53 1.34 5L2.5 21.5l4.5-.84A9.96 9.96 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg></div>';

      var card = document.createElement('div');
      card.className = 'db-card';
      card.innerHTML =
        '<div class="db-card-stripe" style="background:linear-gradient(90deg,' + esc(primary) + ',' + esc(secondary) + ')"></div>' +
        '<div class="db-card-body">' +
          '<div class="db-card-top">' +
            '<div class="db-card-avatar">' + avatarHtml + '</div>' +
            '<div class="db-card-info">' +
              '<div class="db-card-name">' + esc(w.name) + '</div>' +
              '<div class="db-card-brand">' + esc(branding.name || '') + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="db-card-webhook" title="' + esc(w.webhookUrl) + '">' + esc(truncate(w.webhookUrl, 48)) + '</div>' +
          '<div class="db-card-meta"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>' + esc(fmtDate(w.createdAt)) + '</div>' +
        '</div>' +
        '<div class="db-card-actions">' +
          '<button class="db-btn db-btn-secondary btn-edit" data-id="' + esc(w.id) + '"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>Bewerken</button>' +
          '<button class="db-btn db-btn-ghost db-btn-icon btn-copy-embed" data-id="' + esc(w.id) + '" title="Kopieer embed code"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg></button>' +
        '</div>';

      return card;
    }

    // ─── Lijst renderen ───────────────────────────────────────────────────────────

    function renderList() {
      var grid  = document.getElementById('db-widget-grid');
      var badge = document.getElementById('db-nav-badge-sidebar');
      if (!grid) return;
      if (badge) badge.textContent = state.widgets.length;

      if (state.widgets.length === 0) {
        grid.innerHTML =
          '<div class="db-empty">' +
            '<div class="db-empty-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 1.82.49 3.53 1.34 5L2.5 21.5l4.5-.84A9.96 9.96 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg></div>' +
            '<h3>Nog geen widgets</h3>' +
            '<p>Maak jouw eerste chatwidget aan en embed het op elke website.</p>' +
            '<button class="db-btn db-btn-primary" id="db-empty-create-btn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>Eerste widget aanmaken</button>' +
          '</div>';
        document.getElementById('db-empty-create-btn').addEventListener('click', function() { showForm(null); });
        return;
      }

      grid.innerHTML = '';
      state.widgets.forEach(function(w) { grid.appendChild(renderCard(w)); });

      grid.querySelectorAll('.btn-edit').forEach(function(btn) {
        btn.addEventListener('click', function() { showForm(btn.dataset.id); });
      });

      grid.querySelectorAll('.btn-copy-embed').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var w = state.widgets.find(function(x) { return x.id === btn.dataset.id; });
          if (!w) return;
          copyText(embedCode(w));
          toast('Zelfstandige embed code gekopieerd!');
        });
      });
    }

    // ─── Live preview ─────────────────────────────────────────────────────────────

    var previewDebounce = null;

    function updatePreview() { clearTimeout(previewDebounce); previewDebounce = setTimeout(doUpdatePreview, 180); }

    function doUpdatePreview() {
      var form = document.getElementById('db-widget-form');
      if (!form) return;

      var primary   = form.querySelector('[name="theme.primaryColor"]').value || '#6366f1';
      var secondary = form.querySelector('[name="theme.secondaryColor"]').value || '#4f46e5';
      var logoUrl   = form.querySelector('[name="branding.logoUrl"]').value || '';
      var name      = form.querySelector('[name="branding.name"]').value || 'Chat';
      var toggleLbl = form.querySelector('[name="branding.toggleLabel"]').value || 'Stel ons een vraag';
      var welcome   = form.querySelector('[name="branding.welcomeText"]').value || 'Hallo! Hoe kan ik u helpen?';

      var header = document.querySelector('.db-preview-header');
      if (header) header.style.background = 'linear-gradient(135deg,' + primary + ',' + secondary + ')';

      var previewLogo = document.querySelector('.db-preview-logo');
      if (previewLogo) {
        if (logoUrl) {
          previewLogo.innerHTML = '<img src="' + esc(logoUrl) + '" alt="" onerror="this.style.display=\'none\'" style="width:100%;height:100%;object-fit:contain" />';
        } else {
          previewLogo.innerHTML = '<svg viewBox="0 0 24 24" width="12" height="12" fill="white"><path d="M12 2C6.477 2 2 6.477 2 12c0 1.82.49 3.53 1.34 5L2.5 21.5l4.5-.84A9.96 9.96 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg>';
        }
      }

      var titleEl = document.querySelector('.db-preview-title');
      if (titleEl) titleEl.textContent = name;

      var botMsgs = document.querySelectorAll('.db-preview-msg-bot');
      if (botMsgs.length > 0) botMsgs[0].textContent = truncate(welcome, 60);

      document.querySelectorAll('.db-preview-msg-user').forEach(function(m) {
        m.style.background = 'linear-gradient(135deg,' + primary + ',' + secondary + ')';
      });

      var sendBtn = document.querySelector('.db-preview-send');
      if (sendBtn) sendBtn.style.background = 'linear-gradient(135deg,' + primary + ',' + secondary + ')';

      var toggle = document.querySelector('.db-preview-toggle');
      if (toggle) {
        toggle.style.background = 'linear-gradient(135deg,' + primary + ',' + secondary + ')';
        var lbl = toggle.querySelector('.db-preview-toggle-label');
        if (lbl) lbl.textContent = truncate(toggleLbl, 24);
      }
    }

    // ─── Embed code in formulier bijwerken ────────────────────────────────────────

    function updateEmbedCode(widgetId) {
      var block = document.getElementById('db-embed-section');
      var pre   = document.getElementById('db-embed-code-pre');
      if (!block || !pre) return;
      if (!widgetId) { block.classList.add('db-hidden'); return; }
      block.classList.remove('db-hidden');
      var widget = state.widgets.find(function(x) { return x.id === widgetId; });
      if (widget) pre.textContent = embedCode(widget);
    }

    // ─── Views ───────────────────────────────────────────────────────────────────

    function showList() {
      document.getElementById('db-view-list').classList.remove('db-hidden');
      document.getElementById('db-view-form').classList.add('db-hidden');
      document.getElementById('db-topbar-title').textContent = 'Widgets';
      document.getElementById('db-topbar-sub').textContent = '';
      document.querySelector('.db-nav-item[data-view="list"]').classList.add('active');
      state.widgets = Store.list();
      renderList();
    }

    function showForm(widgetId) {
      state.editingId = widgetId || null;
      document.getElementById('db-view-list').classList.add('db-hidden');
      document.getElementById('db-view-form').classList.remove('db-hidden');
      document.querySelector('.db-nav-item[data-view="list"]').classList.remove('active');

      var isNew = !widgetId;
      document.getElementById('db-topbar-title').textContent = isNew ? 'Nieuwe widget' : 'Widget bewerken';
      document.getElementById('db-topbar-sub').textContent = '';
      document.getElementById('db-form-heading').textContent = isNew ? 'Nieuwe widget aanmaken' : 'Widget bewerken';

      var deleteBtn = document.getElementById('db-btn-delete');
      isNew ? deleteBtn.classList.add('db-hidden') : deleteBtn.classList.remove('db-hidden');

      if (isNew) {
        resetForm();
        updateEmbedCode(null);
        doUpdatePreview();
      } else {
        var w = state.widgets.find(function(x) { return x.id === widgetId; }) || Store.get(widgetId);
        if (w) { fillForm(w); updateEmbedCode(widgetId); doUpdatePreview(); }
      }
    }

    // ─── Formulier helpers ────────────────────────────────────────────────────────

    function resetForm() {
      var form = document.getElementById('db-widget-form');
      if (!form) return;

      setField(form,'theme.primaryColor','#6366f1');
      setField(form,'theme.secondaryColor','#4f46e5');
      setField(form,'theme.primaryHex','#6366f1');
      setField(form,'theme.secondaryHex','#4f46e5');
      syncPresets(form,'#6366f1');
    }

    function fillForm(w) {

      setField(form,'branding.welcomeText',     br.welcomeText     || '');
      setField(form,'branding.toggleLabel',     br.toggleLabel     || '');
      setField(form,'branding.inputPlaceholder',br.inputPlaceholder|| '');
      setField(form,'branding.sendLabel',       br.sendLabel       || '');
      var p = th.primaryColor   || '#6366f1';
      var s = th.secondaryColor || '#4f46e5';
      setField(form,'theme.primaryColor',  p);
      setField(form,'theme.secondaryColor',s);
      setField(form,'theme.primaryHex',    p);
      setField(form,'theme.secondaryHex',  s);
      syncPresets(form, p);
    }

    function setField(form,name,value) { var el=form.querySelector('[name="'+name+'"]'); if(el) el.value=value; }
    function getField(form,name) { var el=form.querySelector('[name="'+name+'"]'); return el ? el.value.trim() : ''; }

    function readFormData() {
      var form = document.getElementById('db-widget-form');
      return {
        name:       getField(form,'name'),
        webhookUrl: getField(form,'webhookUrl'),
        branding: {
          name:             getField(form,'branding.name'),
          logoUrl:          getField(form,'branding.logoUrl'),
          welcomeText:      getField(form,'branding.welcomeText'),
          toggleLabel:      getField(form,'branding.toggleLabel'),
          inputPlaceholder: getField(form,'branding.inputPlaceholder'),
          sendLabel:        getField(form,'branding.sendLabel')
        },
        theme: {
          primaryColor:   getField(form,'theme.primaryColor'),
          secondaryColor: getField(form,'theme.secondaryColor')
        }
      };
    }

    function syncPresets(form, value) {
      if (typeof form === 'string') { value = form; form = document.getElementById('db-widget-form'); }
      if (!form) return;
      form.querySelectorAll('.db-color-preset').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.primary === value);
      });
    }

    function initColorInputs(form) {
      var pp = form.querySelector('[name="theme.primaryColor"]');
      var ph = form.querySelector('[name="theme.primaryHex"]');
      pp.addEventListener('input', function() { ph.value=pp.value; syncPresets(form,pp.value); updatePreview(); });
      ph.addEventListener('input', function() { if(/^#[0-9a-f]{6}$/i.test(ph.value)){pp.value=ph.value; syncPresets(form,ph.value); updatePreview();} });
      var sp = form.querySelector('[name="theme.secondaryColor"]');
      var sh = form.querySelector('[name="theme.secondaryHex"]');
      sp.addEventListener('input', function() { sh.value=sp.value; updatePreview(); });
      sh.addEventListener('input', function() { if(/^#[0-9a-f]{6}$/i.test(sh.value)){sp.value=sh.value; updatePreview();} });
      form.querySelectorAll('.db-color-preset').forEach(function(btn) {
        btn.addEventListener('click', function() {
          pp.value=btn.dataset.primary; ph.value=btn.dataset.primary;
          sp.value=btn.dataset.secondary; sh.value=btn.dataset.secondary;
          syncPresets(form,btn.dataset.primary); updatePreview();
        });
      });
    }

    // ─── Opslaan / Verwijderen ────────────────────────────────────────────────────

    function saveWidget(e) {
      e.preventDefault();
      var data    = readFormData();
      var saveBtn = document.getElementById('db-btn-save');
      if (!data.name)       { toast('Vul een naam in.','error'); return; }
      if (!data.webhookUrl) { toast('Vul een webhook URL in.','error'); return; }

      saveBtn.disabled = true;
      saveBtn.textContent = 'Opslaan...';

      var w = state.editingId ? Store.update(state.editingId, data) : Store.create(data);

      if (w) {
        if (state.editingId) {
          var idx = state.widgets.findIndex(function(x) { return x.id === state.editingId; });
          if (idx >= 0) state.widgets[idx] = w;
        } else {
          state.widgets.unshift(w);
          state.editingId = w.id;
          updateEmbedCode(w.id);
        }
        toast('Widget opgeslagen!');
      } else {
        toast('Opslaan mislukt.','error');
      }

      saveBtn.disabled = false;
      saveBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>Opslaan';
    }

    function deleteWidget() {
      if (!state.editingId) return;
      var w = state.widgets.find(function(x) { return x.id === state.editingId; });
      if (!confirm('Weet je zeker dat je "' + (w ? w.name : 'dit widget') + '" wilt verwijderen?')) return;
      Store.del(state.editingId);
      state.widgets = state.widgets.filter(function(x) { return x.id !== state.editingId; });
      toast('Widget verwijderd.');
      showList();
    }

    // ─── Klembord ────────────────────────────────────────────────────────────────

    function copyText(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).catch(function() { fallbackCopy(text); });
      } else { fallbackCopy(text); }
    }

    function fallbackCopy(text) {
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.cssText = 'position:fixed;top:-9999px';
      document.body.appendChild(ta); ta.select(); document.execCommand('copy');
      document.body.removeChild(ta);
    }

    // ─── DOM opbouwen ─────────────────────────────────────────────────────────────

    function makePreset(p, s, label) {
      return '<div class="db-color-preset" data-primary="'+p+'" data-secondary="'+s+'" title="'+label+'" style="background:linear-gradient(135deg,'+p+','+s+')"></div>';
    }

    function buildListView() {
      var div = document.createElement('div');
      div.id = 'db-view-list';
      div.innerHTML =
        '<div class="db-cards-header">' +
          '<h2>Alle widgets <span id="db-nav-badge" class="db-badge db-badge-neutral">0</span></h2>' +
          '<button class="db-btn db-btn-primary" id="db-btn-new"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>Nieuwe widget</button>' +
        '</div>' +
        '<div class="db-grid" id="db-widget-grid"></div>';
      return div;
    }

          '<h2 id="db-form-heading" style="flex:1">Nieuwe widget</h2>' +

              '<div class="db-section-body">' +

              '<div class="db-section"><div class="db-section-header"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg><h3>Branding</h3></div>' +
              '<div class="db-section-body">' +

                '<div class="db-field"><label>Welkomstbericht</label><textarea class="db-textarea" name="branding.welcomeText" placeholder="Hallo! Hoe kan ik u helpen?"></textarea></div>' +

              '<div class="db-section"><div class="db-section-header"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg><h3>Kleurenthema</h3></div>' +
              '<div class="db-section-body">' +
                '<div class="db-color-presets">' +
                  makePreset('#6366f1','#4f46e5','Indigo') +
                  makePreset('#f21c00','#ff7a42','Rood') +
                  makePreset('#0ea5e9','#0284c7','Blauw') +

                '<div class="db-field"><label>Secundaire kleur <span style="font-size:11px;font-weight:400;color:#94a3b8">(gradient)</span></label><div class="db-color-row"><input type="color" class="db-color-input" name="theme.secondaryColor" value="#4f46e5" /><input type="text" class="db-input db-color-hex" name="theme.secondaryHex" value="#4f46e5" placeholder="#4f46e5" maxlength="7" /></div></div>' +

                '<div class="db-section-header"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg><h3>Live preview</h3></div>' +
                '<div class="db-section-body" style="padding:16px">' +
                  '<div class="db-preview-wrap">' +
                    '<div class="db-preview-label">Preview</div>' +
                    '<div class="db-preview-window">' +
                      '<div class="db-preview-header" style="background:linear-gradient(135deg,#6366f1,#4f46e5)"><div class="db-preview-logo"><svg viewBox="0 0 24 24" width="12" height="12" fill="white"><path d="M12 2C6.477 2 2 6.477 2 12c0 1.82.49 3.53 1.34 5L2.5 21.5l4.5-.84A9.96 9.96 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg></div><div class="db-preview-title">Chat</div></div>' +
                      '<div class="db-preview-messages"><div class="db-preview-msg db-preview-msg-bot">Hallo! Hoe kan ik u helpen?</div><div class="db-preview-msg db-preview-msg-user" style="background:linear-gradient(135deg,#6366f1,#4f46e5)">Hallo, ik heb een vraag</div><div class="db-preview-msg db-preview-msg-bot">Natuurlijk, ik help u graag!</div></div>' +
                      '<div class="db-preview-input"><div class="db-preview-input-field"></div><div class="db-preview-send" style="background:linear-gradient(135deg,#6366f1,#4f46e5)"></div></div>' +
                    '</div>' +
                    '<div class="db-preview-toggle" style="background:linear-gradient(135deg,#6366f1,#4f46e5)"><svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 1.82.49 3.53 1.34 5L2.5 21.5l4.5-.84A9.96 9.96 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2z"/></svg><span class="db-preview-toggle-label">Stel ons een vraag</span></div>' +
                  '</div>' +
                '</div>' +
              '</div>' +
            '</div>' +

          '</div>' +
        '</form>' +

        '<div class="db-form-footer">' +
          '<button type="button" class="db-btn db-btn-danger db-hidden" id="db-btn-delete"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>Verwijderen</button>' +

            '<button type="button" class="db-btn db-btn-secondary" id="db-btn-cancel">Annuleren</button>' +
            '<button type="submit" form="db-widget-form" class="db-btn db-btn-primary" id="db-btn-save"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>Opslaan</button>' +
          '</div>' +
        '</div>';
      return div;

    // ─── Events koppelen ─────────────────────────────────────────────────────────

    function bindFormEvents() {
      var form = document.getElementById('db-widget-form');
      if (!form) return;
      form.addEventListener('input', updatePreview);
      initColorInputs(form);
      form.addEventListener('submit', saveWidget);
      document.getElementById('db-btn-back').addEventListener('click', showList);
      document.getElementById('db-btn-cancel').addEventListener('click', showList);
      document.getElementById('db-btn-delete').addEventListener('click', deleteWidget);
      var copyBtn = document.getElementById('db-embed-copy-btn');
      if (copyBtn) {
        copyBtn.addEventListener('click', function() {
          var pre = document.getElementById('db-embed-code-pre');
          if (!pre) return;
          // Kopieer alleen de zelfstandige versie (na het commentaar)
          var fullText = pre.textContent;
          var idx = fullText.indexOf('<script data-config=');
          var standalone = idx !== -1 ? fullText.substring(idx) : fullText;
          copyText(standalone);
          copyBtn.textContent = 'Gekopieerd!';
          copyBtn.classList.add('copied');
          setTimeout(function() { copyBtn.textContent = 'Kopieer'; copyBtn.classList.remove('copied'); }, 2000);
        });
      }
    }

    // ─── Bootstrap ───────────────────────────────────────────────────────────────

    function init() {
      var content = document.getElementById('db-content');
      if (!content) return;

      content.appendChild(buildListView());
      content.appendChild(buildFormView());

      var toastEl = document.createElement('div');
      toastEl.id = 'db-toast';
      toastEl.className = 'db-toast';
      toastEl.innerHTML = '<svg class="db-toast-icon" viewBox="0 0 24 24" fill="currentColor"></svg><span class="db-toast-msg"></span>';
      document.body.appendChild(toastEl);

      document.getElementById('db-btn-new').addEventListener('click', function() { showForm(null); });

      document.querySelectorAll('.db-nav-item').forEach(function(item) {
        item.addEventListener('click', function(e) {
          e.preventDefault();
          if (item.dataset.view === 'list') showList();
        });
      });

      bindFormEvents();
      showList();
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

  }());
  </script>
</body>
